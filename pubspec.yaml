name: fitnessapp
description: Gym Management App
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: '>=3.0.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.2
  carousel_slider: ^5.1.2
  fl_chart: ^1.2.0
  simple_animation_progress_bar: ^1.6.0
  dotted_dashed_line: ^0.0.3
  simple_circular_progress_bar: ^1.0.2
  animated_toggle_switch: ^0.6.2
  flutter_native_splash: ^2.4.3
  readmore: ^2.1.0
  calendar_agenda:
    path: dev_lib/calendar_agenda/

  # Backend integration
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0
  provider: ^6.1.2
  shared_preferences: ^2.2.2
  image_picker: ^1.2.2
  file_picker: ^8.1.2
  cached_network_image: ^3.3.1
  intl: ^0.20.2
  lottie: ^3.1.0
  google_fonts: ^6.2.1
  awesome_dialog: ^3.2.0
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  gap: ^3.0.1

  # Firebase — real-time chat + push notifications
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1
  confetti: ^0.7.0
  url_launcher: ^6.3.2
  flutter_contacts: ^1.1.9+2
  flutter_svg: ^2.0.10+1
  flutter_image_compress: ^2.3.0

flutter_native_splash:
  color: "#1C1714"
  color_dark: "#1C1714"
  image: assets/images/liaqh-hybrid-512px.png
  image_dark: assets/images/liaqh-hybrid-512px.png
  android_12:
    color: "#1C1714"
    color_dark: "#1C1714"
    image: assets/images/liaqh-hybrid-512px.png
    image_dark: assets/images/liaqh-hybrid-512px.png
    icon_background_color: "#D97757"
    icon_background_color_dark: "#D97757"
  android: true
  ios: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/liaqh-hybrid-512px.png"
  adaptive_icon_background: "#D97757"
  adaptive_icon_foreground: "assets/images/liaqh-hybrid-512px.png"
  remove_alpha_ios: true

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  generate: true
  uses-material-design: true

  assets:
     - assets/images/
     - assets/icons/
